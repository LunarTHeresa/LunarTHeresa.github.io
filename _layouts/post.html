---
layout: default
---
<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
            <span class="post-date">{{ page.date | date: "%Y年%m月%d日" }}</span>
            {% if page.author %}
            <span class="post-author">作者：{{ page.author }}</span>
            {% endif %}
            {% if page.tags %}
            <span class="post-tags">标签：{{ page.tags | join: ", " }}</span>
            {% endif %}
        </div>
    </header>
    <div class="post-content">
        {{ content }}
    </div>
</article>
